name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common apt-transport-https gnupg
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://archive.neon.kde.org/public.key | sudo gpg --dearmor -o /etc/apt/keyrings/neon-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/neon-archive-keyring.gpg] http://archive.neon.kde.org/user noble main" | sudo tee /etc/apt/sources.list.d/neon.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            extra-cmake-modules \
            build-essential \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            kf6-kcoreaddons-dev \
            kf6-ki18n-dev \
            kf6-kservice-dev \
            kf6-kwindowsystem-dev \
            kf6-kconfig-dev \
            kf6-kconfigwidgets-dev \
            kf6-knotifications-dev \
            kf6-kio-dev \
            kf6-kbookmarks-dev \
            kf6-kitemmodels-dev \
            kf6-knewstuff-dev \
            kf6-kpackage-dev \
            kf6-kactivities-dev \
            libplasma-dev \
            plasma-activities-dev \
            plasma-activities-stats-dev \
            libksysguard-dev \
            libepoxy-dev \
            libdrm-dev \
            plasma-workspace-dev

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: plasmadock-build
          path: build/
          retention-days: 7

  package-deb:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common apt-transport-https gnupg
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://archive.neon.kde.org/public.key | sudo gpg --dearmor -o /etc/apt/keyrings/neon-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/neon-archive-keyring.gpg] http://archive.neon.kde.org/user noble main" | sudo tee /etc/apt/sources.list.d/neon.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            extra-cmake-modules \
            build-essential \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            kf6-kcoreaddons-dev \
            kf6-ki18n-dev \
            kf6-kservice-dev \
            kf6-kconfig-dev \
            kf6-kconfigwidgets-dev \
            kf6-knotifications-dev \
            kf6-kio-dev \
            kf6-kbookmarks-dev \
            kf6-kwindowsystem-dev \
            kf6-kitemmodels-dev \
            kf6-knewstuff-dev \
            kf6-kpackage-dev \
            kf6-kactivities-dev \
            libplasma-dev \
            plasma-activities-dev \
            plasma-activities-stats-dev \
            libksysguard-dev \
            libepoxy-dev \
            libdrm-dev \
            plasma-workspace-dev \
            dpkg-dev

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)

      - name: Create DEB package
        run: |
          DEB_STAGING="${{ github.workspace }}/deb-staging"
          DEB_OUT="${{ github.workspace }}/deb-out"
          mkdir -p "${DEB_STAGING}" "${DEB_OUT}"

          cd build
          make install DESTDIR="${DEB_STAGING}"

          mkdir -p "${DEB_STAGING}/DEBIAN"

          cat > "${DEB_STAGING}/DEBIAN/control" << EOF
          Package: plasmadock
          Version: ${GITHUB_REF_NAME#v}
          Section: kde
          Priority: optional
          Architecture: $(dpkg --print-architecture)
          Depends: plasma-desktop, qt6-base, qt6-declarative, kf6-ki18n, kf6-kservice, kf6-kconfig, kf6-kio, kf6-kactivities, kf6-kwindowsystem, kf6-kitemmodels, libplasma, kf6-kbookmarks
          Maintainer: Tyler Wagler <tyler.wagler@elytrondefense.com>
          Description: PlasmaDock: Task manager with macOS-style dock zoom
           A Plasma 6 task manager replacement featuring macOS-style icon zooming
           and advanced window management.
          Homepage: https://github.com/tylerwagler/PlasmaDock
          EOF

          cat > "${DEB_STAGING}/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          echo "PlasmaDock installed successfully!"
          if pgrep -x plasmashell > /dev/null; then
            plasmashell --replace &disown
          else
            echo "You may need to log out and back in to see changes."
          fi
          exit 0
          EOF

          chmod 755 "${DEB_STAGING}/DEBIAN/postinst"

          cat > "${DEB_STAGING}/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          exit 0
          EOF

          chmod 755 "${DEB_STAGING}/DEBIAN/prerm"

          DEB_ARCH=$(dpkg --print-architecture)
          VERSION="${GITHUB_REF_NAME#v}"
          dpkg-deb --build "${DEB_STAGING}" "${DEB_OUT}/plasmadock_${VERSION}_${DEB_ARCH}.deb"
          tar -czf "${DEB_OUT}/plasmadock_${VERSION}_${DEB_ARCH}.tar.gz" -C "${DEB_STAGING}" .

      - name: Upload DEB Release Asset
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            deb-out/plasmadock_*.deb
            deb-out/plasmadock_*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-rpm:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'

    container:
      image: fedora:41

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dnf install -y \
            cmake \
            extra-cmake-modules \
            gcc-c++ \
            qt6-qtbase-devel \
            qt6-qtbase-private-devel \
            qt6-qtdeclarative-devel \
            qt6-qttools-devel \
            kf6-kcoreaddons-devel \
            kf6-kconfig-devel \
            kf6-kconfigwidgets-devel \
            kf6-kcrash-devel \
            kf6-ki18n-devel \
            kf6-kio-devel \
            kf6-knotifications-devel \
            kf6-kwindowsystem-devel \
            kf6-solid-devel \
            kf6-plasma-devel \
            libksysguard-devel \
            kf6-kbookmarks-devel \
            kf6-knewstuff-devel \
            kf6-kactivities-devel \
            kf6-kservice-devel \
            kf6-kitemmodels-devel \
            plasma-activities-devel \
            plasma-activities-stats-devel \
            plasma-workspace-devel \
            libepoxy-devel \
            libdrm-devel \
            rpm-build \
            rpm-devel

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)

      - name: Create RPM package
        run: |
          RPM_BUILDROOT="${{ github.workspace }}/rpm-staging"
          RPM_TOPDIR="${{ github.workspace }}/rpm-build"

          mkdir -p "${RPM_BUILDROOT}"
          cd build
          make install DESTDIR="${RPM_BUILDROOT}"

          mkdir -p "${RPM_TOPDIR}"/{RPMS/x86_64,SOURCES,SPECS,BUILD}

          cat > ${RPM_TOPDIR}/SPECS/plasmadock.spec << 'SPEC'
          Name:           plasmadock
          Version:        %{_version}
          Release:        1%{?dist}
          Summary:        PlasmaDock: Task manager with macOS-style dock zoom

          License:        GPL-2.0-or-later
          URL:            https://github.com/tylerwagler/PlasmaDock

          Requires:       plasma-desktop
          Requires:       qt6-qtbase
          Requires:       qt6-qtdeclarative
          Requires:       kf6-kconfig
          Requires:       kf6-ki18n
          Requires:       kf6-kio
          Requires:       kf6-kwindowsystem
          Requires:       kf6-plasma
          Requires:       kf6-kactivities
          Requires:       kf6-kservice
          Requires:       kf6-kbookmarks
          Requires:       kf6-kitemmodels
          Requires:       libksysguard

          %description
          PlasmaDock is a Plasma 6 task manager replacement featuring
          macOS-style icon zooming and advanced window management.

          # Skip prep/build — already built and installed to BUILDROOT
          %install
          cp -a %{_buildroot_staging}/. %{buildroot}/

          %files
          /usr/share/plasma/plasmoids/org.plasmadock/
          /usr/share/plasma/layout-templates/org.plasmadock.panel/
          %{_libdir}/qt6/qml/org/plasmadock/

          %post
          if pgrep -x plasmashell > /dev/null; then
            plasmashell --replace &disown
          fi

          %postun
          exit 0
          SPEC

          VERSION="${GITHUB_REF_NAME#v}"
          rpmbuild -bb \
            --define "_topdir ${RPM_TOPDIR}" \
            --define "_version ${VERSION}" \
            --define "_buildroot_staging ${RPM_BUILDROOT}" \
            ${RPM_TOPDIR}/SPECS/plasmadock.spec

          cp ${RPM_TOPDIR}/RPMS/x86_64/plasmadock-*.rpm "${GITHUB_WORKSPACE}/"
          tar -czf "${GITHUB_WORKSPACE}/plasmadock_${VERSION}_x86_64.tar.gz" -C ${RPM_BUILDROOT} .
          ls -la "${GITHUB_WORKSPACE}"/plasmadock*

      - name: Upload RPM Release Asset
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            plasmadock-*.rpm
            plasmadock_*_x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
